{% extends 'base.html' %}

{% block content %}
<div class="text-center">
    <h1 class="mb-2">QR-Code</h1>
    <p class="text-muted mb-4">Ausdrucken und z.B. am Kühlschrank befestigen</p>

    <div class="card d-inline-block p-4 mb-4">
        <h4 class="mb-3">{{ patient['name'] }}</h4>
        <p class="text-muted">geb. {{ patient['geburtsdatum'] }}</p>
        <img src="data:image/png;base64,{{ img_base64 }}" alt="QR-Code" width="250">
        <p class="mt-3 text-muted small">QR-Code scannen → Mediplan öffnet sich</p>
    </div>

    <div class="d-block">
        <button onclick="window.print()" class="btn btn-danger me-2">🖨️ Drucken</button>
        <a href="/patient/{{ patient['id'] }}" class="btn btn-secondary">← Zurück</a>
    </div>
</div>
{% endblock %}
