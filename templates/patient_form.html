{% extends 'base.html' %}

{% block content %}
<h1 class="mb-4">Neuen Patienten anlegen</h1>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Vorname</label>
                <input type="text" name="vorname" class="form-control" required>
                <label class="form-label mt-3">Nachname</label>
                <input type="text" name="nachname" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Geburtsdatum</label>
                <input type="date" name="geburtsdatum" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Allergien / Unverträglichkeiten</label>
                <input type="text" name="allergien" class="form-control" placeholder="z.B. Penicillin">
            </div>
            <a href="/" class="btn btn-secondary">Abbrechen</a>
            <button type="submit" class="btn btn-danger">Patient anlegen</button>
        </form>
    </div>
</div>
{% endblock %}
